[workspace]
resolver = "3"
members = [
    "crates/srt",
    "crates/srt-core",
    "crates/srt-error",
    "crates/srt-reliability",
    "crates/srt-engine",
    "crates/srt-wire",
]

[workspace.package]
edition = "2024"
license = "Apache-2.0"
authors = ["Atlas Orein <gamesworldcraft@gamil.com>"]
repository = "https://github.com/atlas-orien/srt"
readme = "README.md"

[workspace.dependencies]
srt-core = { path = "crates/srt-core", version = "0.1.0" }
srt-error = { path = "crates/srt-error", version = "0.1.0" }
srt-reliability = { path = "crates/srt-reliability", version = "0.1.0" }
srt-engine = { path = "crates/srt-engine", version = "0.1.0" }
srt-wire = { path = "crates/srt-wire", version = "0.1.0" }
criterion = { version = "0.8.2", default-features = false }

[workspace.lints.rust]
missing_docs = "warn"
unsafe_code = "forbid"

[workspace.lints.clippy]
alloc_instead_of_core = "warn"
std_instead_of_alloc = "warn"
std_instead_of_core = "warn"
