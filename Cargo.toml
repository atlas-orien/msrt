[workspace]
resolver = "3"
members = [
    "crates/srt-core",
    "crates/srt-error",
    "crates/srt-reliability",
    "crates/srt-runtime",
]

[workspace.package]
edition = "2024"
license = "Apache-2.0"
authors = ["Atlas Orein <gamesworldcraft@gamil.com>"]
repository = "https://github.com/atlas-orien/srt"
readme = "README.md"

[workspace.lints.rust]
missing_docs = "warn"
unsafe_code = "forbid"

[workspace.lints.clippy]
alloc_instead_of_core = "warn"
std_instead_of_alloc = "warn"
std_instead_of_core = "warn"
