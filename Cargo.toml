[package]
name = "msrt"
version = "0.1.1"
edition = "2024"
license = "Apache-2.0"
authors = ["Atlas Orein <gamesworldcraft@gamil.com>"]
repository = "https://github.com/atlas-orien/msrt"
readme = "README.md"
description = "Portable MSRT protocol implementation."
include = [
    "Cargo.toml",
    "LICENSE",
    "README.md",
    "ROADMAP.md",
    "SPEC.md",
    "benches/**",
    "src/**",
    "tests/**",
]

[features]
default = ["std"]
std = []

[dependencies]

[dev-dependencies]
criterion = { version = "0.8.2", default-features = false }

[[bench]]
name = "protocol"
harness = false

[lints.rust]
missing_docs = "warn"
unsafe_code = "forbid"

[lints.clippy]
alloc_instead_of_core = "warn"
std_instead_of_alloc = "warn"
std_instead_of_core = "warn"
